<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyramid Quest: Cinematic Education</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-gold: #ffcf33;
            --deep-lapis: #0a192f;
            --neon-blue: #00f2fe;
            --stone-bg: #1e293b;
            --success-green: #00e676;
            --danger-red: #ff3d00;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- BACKGROUND PARTICLES EFFECT --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            opacity: 0.3;
            z-index: -1;
            pointer-events: none;
        }

        /* =========================================
           LOADING SCREEN (BOOK ANIMATION)
           ========================================= */
        #loading-screen {
            --hue: 223;
            --bg: hsl(var(--hue),10%,15%);
            --fg: hsl(var(--hue),10%,90%);
            --primary: #ffcf33; /* Gold accent */
            --primary-l: #ffdd66;
            --primary-d: #b8860b;
            --white: hsl(var(--hue),10%,100%);
            --white-d: hsl(var(--hue),10%,45%);
            
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: var(--bg);
            color: var(--fg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .book-container {
            font-size: calc(16px + (24 - 16) * (100vw - 320px) / (1280 - 320));
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .book, .book__pg-shadow, .book__pg {
            animation: cover 7s ease-in-out infinite;
        }

        .book {
            background-color: var(--primary-l);
            border-radius: 0.25em;
            box-shadow: 0 0.25em 0.5em hsla(0,0%,0%,0.3), 0 0 0 0.25em var(--primary) inset;
            padding: 0.25em;
            perspective: 37.5em;
            position: relative;
            width: 8em;
            height: 6em;
            transform: translate3d(0,0,0);
            transform-style: preserve-3d;
        }

        .book__pg-shadow, .book__pg {
            position: absolute;
            left: 0.25em;
            width: calc(50% - 0.25em);
        }

        .book__pg-shadow {
            animation-name: shadow;
            background-image: linear-gradient(-45deg,hsla(0,0%,0%,0) 50%,hsla(0,0%,0%,0.3) 50%);
            filter: blur(0.25em);
            top: calc(100% - 0.25em);
            height: 3.75em;
            transform: scaleY(0);
            transform-origin: 100% 0%;
        }

        .book__pg {
            animation-name: pg1;
            background-color: var(--white);
            background-image: linear-gradient(90deg,hsla(var(--hue),10%,90%,0) 87.5%,hsl(var(--hue),10%,90%));
            height: calc(100% - 0.5em);
            transform-origin: 100% 50%;
        }

        .book__pg--2, .book__pg--3, .book__pg--4 {
            background-image:
                repeating-linear-gradient(hsl(var(--hue),10%,10%) 0 0.125em,hsla(var(--hue),10%,10%,0) 0.125em 0.5em),
                linear-gradient(90deg,hsla(var(--hue),10%,90%,0) 87.5%,hsl(var(--hue),10%,90%));
            background-repeat: no-repeat;
            background-position: center;
            background-size: 2.5em 4.125em, 100% 100%;
        }

        .book__pg--2 { animation-name: pg2; }
        .book__pg--3 { animation-name: pg3; }
        .book__pg--4 { animation-name: pg4; }
        .book__pg--5 { animation-name: pg5; }

        .loading-text {
            font-family: 'Bungee', cursive;
            margin-top: 40px;
            font-size: 1.5rem;
            color: var(--neon-blue);
            letter-spacing: 3px;
            animation: pulseText 1.5s infinite;
        }

        .loading-bar-wrapper {
            width: 250px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--primary-gold));
            width: 0%;
            border-radius: 10px;
            animation: loadProgress 2s linear forwards; /* 2 SECOND LOADING */
        }

        @keyframes loadProgress { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Book Animations (Scrolled tightly) */
        @keyframes cover {
            from, 5%, 45%, 55%, 95%, to { animation-timing-function: ease-out; background-color: var(--primary-l); }
            10%, 40%, 60%, 90% { animation-timing-function: ease-in; background-color: var(--primary-d); }
        }
        @keyframes shadow {
            from, 10.01%, 20.01%, 30.01%, 40.01% { animation-timing-function: ease-in; transform: translate3d(0,0,1px) scaleY(0) rotateY(0); }
            5%, 15%, 25%, 35%, 45%, 55%, 65%, 75%, 85%, 95% { animation-timing-function: ease-out; transform: translate3d(0,0,1px) scaleY(0.2) rotateY(90deg); }
            10%, 20%, 30%, 40%, 50%, to { animation-timing-function: ease-out; transform: translate3d(0,0,1px) scaleY(0) rotateY(180deg); }
            50.01%, 60.01%, 70.01%, 80.01%, 90.01% { animation-timing-function: ease-in; transform: translate3d(0,0,1px) scaleY(0) rotateY(180deg); }
            60%, 70%, 80%, 90%, to { animation-timing-function: ease-out; transform: translate3d(0,0,1px) scaleY(0) rotateY(0); }
        }
        @keyframes pg1 {
            from, to { animation-timing-function: ease-in-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(0.4deg); }
            10%, 15% { animation-timing-function: ease-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(180deg); }
            20%, 80% { animation-timing-function: ease-in; background-color: var(--white-d); transform: translate3d(0,0,1px) rotateY(180deg); }
            85%, 90% { animation-timing-function: ease-in-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(180deg); }
        }
        @keyframes pg2 {
            from, to { animation-timing-function: ease-in; background-color: var(--white-d); transform: translate3d(0,0,1px) rotateY(0.3deg); }
            5%, 10% { animation-timing-function: ease-in-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(0.3deg); }
            20%, 25% { animation-timing-function: ease-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(179.9deg); }
            30%, 70% { animation-timing-function: ease-in; background-color: var(--white-d); transform: translate3d(0,0,1px) rotateY(179.9deg); }
            75%, 80% { animation-timing-function: ease-in-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(179.9deg); }
            90%, 95% { animation-timing-function: ease-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(0.3deg); }
        }
        @keyframes pg3 {
            from, 10%, 90%, to { animation-timing-function: ease-in; background-color: var(--white-d); transform: translate3d(0,0,1px) rotateY(0.2deg); }
            15%, 20% { animation-timing-function: ease-in-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(0.2deg); }
            30%, 35% { animation-timing-function: ease-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(179.8deg); }
            40%, 60% { animation-timing-function: ease-in; background-color: var(--white-d); transform: translate3d(0,0,1px) rotateY(179.8deg); }
            65%, 70% { animation-timing-function: ease-in-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(179.8deg); }
            80%, 85% { animation-timing-function: ease-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(0.2deg); }
        }
        @keyframes pg4 {
            from, 20%, 80%, to { animation-timing-function: ease-in; background-color: var(--white-d); transform: translate3d(0,0,1px) rotateY(0.1deg); }
            25%, 30% { animation-timing-function: ease-in-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(0.1deg); }
            40%, 45% { animation-timing-function: ease-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(179.7deg); }
            50% { animation-timing-function: ease-in; background-color: var(--white-d); transform: translate3d(0,0,1px) rotateY(179.7deg); }
            55%, 60% { animation-timing-function: ease-in-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(179.7deg); }
            70%, 75% { animation-timing-function: ease-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(0.1deg); }
        }
        @keyframes pg5 {
            from, 30%, 70%, to { animation-timing-function: ease-in; background-color: var(--white-d); transform: translate3d(0,0,1px) rotateY(0); }
            35%, 40% { animation-timing-function: ease-in-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(0deg); }
            50% { animation-timing-function: ease-in-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(179.6deg); }
            60%, 65% { animation-timing-function: ease-out; background-color: var(--white); transform: translate3d(0,0,1px) rotateY(0); }
        }

        /* =========================================
           MAIN APP STYLES 
           ========================================= */
        .app-content {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; padding: 40px 20px; animation: fadeInDown 1s ease; }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Bungee', cursive;
            font-size: clamp(2.5rem, 10vw, 5rem);
            margin: 0;
            background: linear-gradient(to bottom, var(--primary-gold), #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 207, 51, 0.5));
        }

        /* THE PYRAMID GRID (30 LEVELS) */
        .pyramid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 25px;
            padding: 40px;
            width: 100%;
            max-width: 1200px;
            perspective: 1000px;
        }

        .level-card {
            aspect-ratio: 1/1;
            background: var(--glass);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .level-card.unlocked {
            border-color: var(--primary-gold);
            background: linear-gradient(135deg, rgba(255,207,51,0.1), rgba(0,242,254,0.1));
            animation: float 3s ease-in-out infinite;
        }

        .level-card.unlocked::after {
            content: "";
            position: absolute;
            inset: -5px;
            border-radius: 28px;
            background: linear-gradient(45deg, var(--primary-gold), var(--neon-blue));
            z-index: -1;
            opacity: 0.3;
            filter: blur(10px);
        }

        .level-card.locked { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        .level-card:hover:not(.locked) {
            transform: scale(1.1) rotateY(10deg);
            box-shadow: 0 20px 40px rgba(0, 242, 254, 0.3);
        }

        .level-card .num { font-family: 'Bungee', cursive; font-size: 2.2rem; color: var(--primary-gold); }
        .level-card .status { font-size: 1.5rem; }

        /* CINEMATIC MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-content {
            background: var(--stone-bg);
            max-width: 1000px;
            margin: 40px auto;
            border-radius: 35px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            box-shadow: 0 0 100px rgba(0, 242, 254, 0.2);
            animation: modalIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .pdf-viewer {
            width: 100%; height: 500px;
            border: 4px solid var(--primary-gold);
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(255, 207, 51, 0.2);
        }

        /* DYNAMIC QUESTION GRID */
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .q-card {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 20px;
            border-left: 5px solid var(--neon-blue);
            transition: 0.3s;
            position: relative; /* For sparks positioning */
        }

        .q-card:focus-within {
            background: rgba(255,255,255,0.1);
            border-left-color: var(--primary-gold);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .q-card label { display: block; margin-bottom: 12px; font-weight: 900; color: var(--primary-gold); font-size: 1.1rem; }

        .q-card input {
            width: 100%; background: transparent; border: none;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            color: white; padding: 10px 0; font-size: 1.2rem;
            outline: none; transition: 0.3s;
        }

        .q-card input:focus { border-color: var(--neon-blue); }

        .submit-btn {
            background: linear-gradient(45deg, var(--primary-gold), #b8860b);
            color: var(--deep-lapis); border: none; padding: 25px; width: 100%;
            border-radius: 20px; font-family: 'Bungee', cursive; font-size: 1.5rem;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 0 #8a6508;
            position: relative; overflow: hidden;
        }

        .submit-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(255, 207, 51, 0.4); }
        .submit-btn:active { transform: translateY(2px); box-shadow: 0 5px 0 #8a6508; }

        /* EFFECTS */
        .shockwave {
            position: fixed; width: 10px; height: 10px;
            background: var(--neon-blue); border-radius: 50%; pointer-events: none;
            animation: shock 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; z-index: 3000;
        }

        @keyframes shock {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(20); opacity: 0; }
        }

        /* INPUT SPARKS */
        .spark {
            position: fixed;
            width: 4px; height: 4px;
            background: var(--primary-gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 3001;
            box-shadow: 0 0 8px var(--primary-gold), 0 0 12px var(--neon-blue);
            animation: sparkAnim 0.5s ease-out forwards;
        }

        @keyframes sparkAnim {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .timer { font-family: 'Bungee'; font-size: 2rem; color: var(--danger-red); text-align: right; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="book-container">
            <div class="book">
                <div class="book__pg-shadow"></div>
                <div class="book__pg"></div>
                <div class="book__pg book__pg--2"></div>
                <div class="book__pg book__pg--3"></div>
                <div class="book__pg book__pg--4"></div>
                <div class="book__pg book__pg--5"></div>
            </div>
        </div>
        <div class="loading-text">PREPARING QUEST...</div>
        <div class="loading-bar-wrapper">
            <div class="loading-bar-fill"></div>
        </div>
    </div>

    <div class="app-content" id="mainApp">
        <header>
            <h1>PYRAMID QUEST</h1>
            <p style="color: var(--neon-blue); font-weight: 700; letter-spacing: 2px;">ASCEND TO KNOWLEDGE</p>
        </header>

        <div class="pyramid-container" id="pyramid"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="levelTitle" style="font-family: 'Bungee'; color: var(--primary-gold); margin: 0;">LEVEL 1</h2>
                <div class="timer" id="timer">10:00</div>
            </div>
            
            <iframe id="pdfFrame" class="pdf-viewer" src=""></iframe>

            <div class="q-card" style="margin-bottom: 20px;">
                <label>👤 STUDENT FULL NAME</label>
                <input type="text" id="studentName" placeholder="Enter name...">
            </div>

            <div class="question-grid" id="questionGrid"></div>

            <button class="submit-btn" onclick="processSubmission(event)">SUBMIT & UNLOCK NEXT LEVEL</button>
            <center><button onclick="closeModal()" style="background:none; border:none; color:rgba(255,255,255,0.4); margin-top:20px; cursor:pointer;">[ Close Window ]</button></center>
        </div>
    </div>

    <script>
        const WHATSAPP_NUM = "123345"; // REPLACE WITH YOUR NUMBER

        const levelData = {
            1: {
                title: "IVAN THE TERRIBLE",
                pdf: "assets/pdfs/ivan_the_terrible.pdf",
                questions: [
                     "When was Ivan the Terrible born?",
                    " What was he doing when he died in 1584",
                    "How old was Ivan when his father died",
                    "Why did Ivan’s son die",
                    "How many times did Ivan get married",
                    "What did Ivan do to animals when he was a child",
                    "Why was he afraid in his last years? (What did he think people wanted to do to him?)",
                    "What chemical (metal) did scientists find in his body?",
                    "Was Ivan a smart man or an uneducated man?",
                    "What color clothes did his secret police wear?",
                    "What happened to his famous library after he died?",
                    "Did Russia become bigger or smaller during his rule?",
                    "What happened to his family line after his death?",
                    "How did he look in his old age?"
                ]
            },
            2: {
                title: "THE SECOND CLIMB",
                pdf: "assets/pdfs/lesson2.pdf",
                questions: ["Summarize page 1.", "What is the key date mentioned?"]
            }
        };

        let activeLevel = null;
        let timerCountdown;

        // --- LOADING SCREEN LOGIC ---
        window.onload = () => {
            // Wait 8 seconds, then fade out loading screen and initialize app
            setTimeout(() => {
                const loader = document.getElementById('loading-screen');
                const app = document.getElementById('mainApp');
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                
                setTimeout(() => {
                    loader.style.display = 'none';
                    app.style.visibility = 'visible';
                    app.style.opacity = '1';
                    initPyramid();
                }, 800); // Wait for fade transition
            }, 8000); 
        };

        // --- SPARK PARTICLES ON INPUT CLICK ---
        document.addEventListener('mousedown', function(e) {
            if (e.target.tagName.toLowerCase() === 'input' && e.target.type === 'text') {
                createSparks(e);
            }
        });

        function createSparks(e) {
            const numSparks = 10;
            for(let i = 0; i < numSparks; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                
                // Randomize trajectory
                const angle = Math.random() * Math.PI * 2;
                const distance = 20 + Math.random() * 40;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                spark.style.setProperty('--tx', `${tx}px`);
                spark.style.setProperty('--ty', `${ty}px`);
                spark.style.left = `${e.clientX}px`;
                spark.style.top = `${e.clientY}px`;
                
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 500);
            }
        }

        // --- CORE APP LOGIC ---
        function initPyramid() {
            const container = document.getElementById('pyramid');
            container.innerHTML = '';
            
            for(let i = 1; i <= 30; i++) {
                const isUnlocked = (i === 1 || localStorage.getItem('quest_level_' + i));
                const card = document.createElement('div');
                card.className = `level-card ${isUnlocked ? 'unlocked' : 'locked'}`;
                card.innerHTML = `<div class="num">${i}</div><div class="status">${isUnlocked ? '📖' : '🔒'}</div>`;
                
                card.onclick = (e) => {
                    spawnShockwave(e);
                    if(isUnlocked) openLevel(i);
                    else alert("Complete previous levels to unlock this path!");
                };
                container.appendChild(card);
            }
        }

        function openLevel(num) {
            const data = levelData[num] || { 
                title: "Level " + num, 
                pdf: "assets/pdfs/default.pdf", 
                questions: ["Analyze the document provided."] 
            };
            
            activeLevel = num;
            document.getElementById('levelTitle').innerText = data.title;
            document.getElementById('pdfFrame').src = data.pdf;
            
            const grid = document.getElementById('questionGrid');
            grid.innerHTML = '';
            data.questions.forEach((q, i) => {
                grid.innerHTML += `
                    <div class="q-card">
                        <label>QUESTION ${i+1}</label>
                        <p style="margin-bottom:10px; font-size:0.9rem; opacity:0.8;">${q}</p>
                        <input type="text" class="ans-input" placeholder="Your answer here...">
                    </div>
                `;
            });

            document.getElementById('modal').style.display = 'block';
            startTimer(600); // 10 minutes
        }

        function processSubmission(e) {
            const name = document.getElementById('studentName').value;
            if(!name) { alert("Please enter your name!"); return; }

            const answers = Array.from(document.querySelectorAll('.ans-input')).map(i => i.value || "No Answer");
            let msg = `${name}%0A%0A` + answers.join('%0A%0A');

            const next = activeLevel + 1;
            if(next <= 30) localStorage.setItem('quest_level_' + next, 'true');

            // --- CONFETTI BURST EFFECT ---
            var duration = 1500;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ffcf33', '#00f2fe'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ffcf33', '#00f2fe'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            // Delay WhatsApp opening and reset to allow confetti to play
            setTimeout(() => {
                window.open(`https://wa.me/${WHATSAPP_NUM}?text=${msg}`, '_blank');
                initPyramid();
                closeModal();
            }, 1800);
        }

        function spawnShockwave(e) {
            const s = document.createElement('div');
            s.className = 'shockwave';
            s.style.left = e.clientX + 'px';
            s.style.top = e.clientY + 'px';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 600);
        }

        function startTimer(duration) {
            clearInterval(timerCountdown);
            let t = duration;
            const disp = document.getElementById('timer');
            timerCountdown = setInterval(() => {
                let m = Math.floor(t / 60);
                let s = t % 60;
                disp.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (--t < 0) { clearInterval(timerCountdown); alert("Time Up!"); }
            }, 1000);
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            clearInterval(timerCountdown);
        }
    </script>
</body>
</html>
