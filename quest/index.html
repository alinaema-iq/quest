<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyramid Quest: Cinematic Education</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-gold: #ffcf33;
            --deep-lapis: #0a192f;
            --neon-blue: #00f2fe;
            --stone-bg: #1e293b;
            --success-green: #00e676;
            --danger-red: #ff3d00;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            opacity: 0.3;
            z-index: -1;
            pointer-events: none;
        }

        /* Loading Screen Styles */
        #loading-screen {
            --hue: 223;
            --bg: hsl(var(--hue),10%,15%);
            --fg: hsl(var(--hue),10%,90%);
            --primary: #ffcf33;
            --primary-l: #ffdd66;
            --primary-d: #b8860b;
            --white: #fff;
            --white-d: #ccc;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: var(--bg);
            color: var(--fg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .book {
            background-color: var(--primary-l);
            border-radius: 0.25em;
            box-shadow: 0 0.25em 0.5em rgba(0,0,0,0.3), 0 0 0 0.25em var(--primary) inset;
            perspective: 37.5em;
            position: relative;
            width: 8em; height: 6em;
            transform-style: preserve-3d;
            animation: cover 7s ease-in-out infinite;
        }

        .book__pg {
            position: absolute; left: 0.25em; width: calc(50% - 0.25em);
            background-color: var(--white);
            height: calc(100% - 0.5em);
            transform-origin: 100% 50%;
            animation: pg1 7s ease-in-out infinite;
        }

        /* App visibility */
        .app-content {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Bungee', cursive;
            font-size: clamp(2.5rem, 10vw, 5rem);
            background: linear-gradient(to bottom, var(--primary-gold), #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 207, 51, 0.5));
            text-align: center;
            padding: 20px;
        }

        .pyramid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 25px;
            padding: 40px;
            width: 100%;
            max-width: 1200px;
        }

        .level-card {
            aspect-ratio: 1/1;
            background: var(--glass);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .level-card.unlocked {
            border-color: var(--primary-gold);
            background: linear-gradient(135deg, rgba(255,207,51,0.1), rgba(0,242,254,0.1));
            animation: float 3s ease-in-out infinite;
        }

        .level-card.locked { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        /* Effects */
        .shockwave {
            position: fixed; width: 10px; height: 10px;
            background: var(--neon-blue); border-radius: 50%; pointer-events: none;
            animation: shock 0.6s ease-out forwards; z-index: 3000;
        }

        @keyframes shock {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(20); opacity: 0; }
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Modals and Grid */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(10, 25, 47, 0.95); backdrop-filter: blur(20px);
            z-index: 2000; padding: 20px; overflow-y: auto;
        }

        .modal-content {
            background: var(--stone-bg); max-width: 1000px; margin: 40px auto;
            border-radius: 35px; padding: 40px; border: 1px solid rgba(255,255,255,0.1);
        }

        .pdf-viewer { width: 100%; height: 500px; border: 4px solid var(--primary-gold); border-radius: 20px; margin-bottom: 20px; }

        .question-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        .q-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border-left: 5px solid var(--neon-blue); }

        .ans-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #555; color: #fff; padding: 10px 0; outline: none; }

        .submit-btn {
            background: linear-gradient(45deg, var(--primary-gold), #b8860b);
            color: var(--deep-lapis); border: none; padding: 20px; width: 100%;
            border-radius: 15px; font-family: 'Bungee'; cursor: pointer; margin-top: 20px;
        }

        /* Simplified Book Animations */
        @keyframes cover { 0%, 100% { background-color: var(--primary-l); } 50% { background-color: var(--primary-d); } }
        @keyframes pg1 { 0%, 100% { transform: rotateY(0deg); } 50% { transform: rotateY(-180deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="book"><div class="book__pg"></div></div>
        <div style="font-family: 'Bungee'; margin-top: 20px; color: var(--neon-blue);">LOADING QUEST...</div>
    </div>

    <div class="app-content" id="mainApp">
        <header>
            <h1>PYRAMID QUEST</h1>
        </header>
        <div class="pyramid-container" id="pyramid"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 id="levelTitle" style="font-family: 'Bungee'; color: var(--primary-gold);">LEVEL</h2>
            <iframe id="pdfFrame" class="pdf-viewer" src=""></iframe>
            <div class="q-card" style="margin-bottom: 20px;">
                <label>👤 STUDENT NAME</label>
                <input type="text" id="studentName" class="ans-input" placeholder="Name here...">
            </div>
            <div class="question-grid" id="questionGrid"></div>
            <button class="submit-btn" onclick="processSubmission()">SUBMIT WORK</button>
            <button onclick="closeModal()" style="display:block; margin: 20px auto; background:none; border:none; color:#777; cursor:pointer;">[ Close ]</button>
        </div>
    </div>

    <script>
        const WHATSAPP_NUM = "964123456789"; // Update this

        const levelData = {
            1: {
                title: "IVAN THE TERRIBLE",
                pdf: "assets/pdfs/ivan_the_terrible.pdf",
                questions: ["When was Ivan born?", "What was he doing when he died?", "How old was he when his father died?"]
            },
            2: {
                title: "THE SECOND CLIMB",
                pdf: "assets/pdfs/lesson2.pdf",
                questions: ["What is the main topic?", "List three key facts."]
            }
        };

        let activeLevel = 1;

        // --- RELIABILITY FIX: INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            // Shortened loading time for better UX
            setTimeout(() => {
                const loader = document.getElementById('loading-screen');
                const app = document.getElementById('mainApp');
                
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    app.style.visibility = 'visible';
                    app.style.opacity = '1';
                    initPyramid();
                }, 800);
            }, 2500); 
        });

        function initPyramid() {
            const container = document.getElementById('pyramid');
            container.innerHTML = '';
            
            for(let i = 1; i <= 30; i++) {
                let isUnlocked = (i === 1);
                try {
                    if (localStorage.getItem('quest_level_' + i) === 'true') isUnlocked = true;
                } catch(e) { console.error("LocalStorage access blocked"); }

                const card = document.createElement('div');
                card.className = `level-card ${isUnlocked ? 'unlocked' : 'locked'}`;
                card.innerHTML = `<div style="font-family:'Bungee'; font-size:2rem; color:var(--primary-gold);">${i}</div>
                                  <div>${isUnlocked ? '📖' : '🔒'}</div>`;
                
                card.onclick = (e) => {
                    spawnShockwave(e);
                    if(isUnlocked) openLevel(i);
                    else alert("Complete previous levels first!");
                };
                container.appendChild(card);
            }
        }

        function openLevel(num) {
            const data = levelData[num] || { title: `Level ${num}`, pdf: "", questions: ["Explore the document."] };
            activeLevel = num;
            document.getElementById('levelTitle').innerText = data.title;
            document.getElementById('pdfFrame').src = data.pdf;
            
            const grid = document.getElementById('questionGrid');
            grid.innerHTML = '';
            data.questions.forEach((q, i) => {
                grid.innerHTML += `
                    <div class="q-card">
                        <label style="color:var(--primary-gold); font-weight:bold;">Q${i+1}: ${q}</label>
                        <input type="text" class="ans-input quest-ans" placeholder="Answer here...">
                    </div>`;
            });
            document.getElementById('modal').style.display = 'block';
        }

        function processSubmission() {
            const name = document.getElementById('studentName').value;
            if(!name) return alert("Enter your name!");

            const answers = Array.from(document.querySelectorAll('.quest-ans')).map((input, idx) => `Q${idx+1}: ${input.value}`);
            const msg = `Student: ${name}%0ALevel: ${activeLevel}%0A%0A` + answers.join('%0A');

            // Unlock next level
            try {
                localStorage.setItem('quest_level_' + (activeLevel + 1), 'true');
            } catch(e) {}

            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            setTimeout(() => {
                window.open(`https://wa.me/${WHATSAPP_NUM}?text=${msg}`, '_blank');
                closeModal();
                initPyramid();
            }, 1500);
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function spawnShockwave(e) {
            const s = document.createElement('div');
            s.className = 'shockwave';
            s.style.left = e.clientX + 'px';
            s.style.top = e.clientY + 'px';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 600);
        }
    </script>
</body>
</html>
